<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Catálogo de Imágenes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:    #0f0e0c;
      --paper:  #f5f0e8;
      --cream:  #ede7d9;
      --accent: #c8411b;
      --muted:  #7a7570;
      --border: #d4cec4;
      --success:#2d7a4f;
      --radius: 3px;
    }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      border-bottom: 2px solid var(--ink);
      padding: 1.5rem 2.5rem;
      display: flex;
      align-items: baseline;
      gap: 1.5rem;
      background: var(--ink);
      color: var(--paper);
    }
    header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 400;
      letter-spacing: -0.02em;
    }
    header span {
      font-size: 0.75rem;
      color: var(--border);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    /* ── Layout ── */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2.5rem 2rem;
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 2.5rem;
      align-items: start;
    }
    @media (max-width: 780px) {
      main { grid-template-columns: 1fr; }
    }

    /* ── Panel / Card ── */
    .panel {
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      background: #fff;
      overflow: hidden;
    }
    .panel-header {
      padding: 0.9rem 1.25rem;
      background: var(--cream);
      border-bottom: 1.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .panel-header h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.1rem;
      font-weight: 400;
    }
    .panel-body { padding: 1.5rem 1.25rem; }

    /* ── Form ── */
    .field { margin-bottom: 1.1rem; }
    label {
      display: block;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }
    input[type="text"],
    textarea,
    select {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      background: var(--paper);
      color: var(--ink);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      padding: 0.55rem 0.75rem;
      transition: border-color 0.15s;
      outline: none;
    }
    input[type="text"]:focus,
    textarea:focus,
    select:focus { border-color: var(--ink); }
    textarea { resize: vertical; min-height: 80px; }

    /* Drop zone */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 2rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }
    .drop-zone:hover, .drop-zone.over {
      border-color: var(--accent);
      background: #fff7f5;
    }
    .drop-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .drop-zone .dz-icon { font-size: 2rem; display: block; margin-bottom: 0.5rem; }
    .drop-zone .dz-text { font-size: 0.75rem; color: var(--muted); }
    .drop-zone .dz-name { font-size: 0.8rem; color: var(--accent); margin-top: 0.4rem; font-weight: 500; }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      font-family: 'DM Mono', monospace; font-size: 0.78rem;
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 0.65rem 1.3rem; border-radius: var(--radius);
      border: 1.5px solid transparent; cursor: pointer;
      transition: all 0.15s; text-decoration: none;
    }
    .btn-primary {
      background: var(--ink); color: var(--paper); border-color: var(--ink);
      width: 100%; justify-content: center;
    }
    .btn-primary:hover { background: #333; }
    .btn-danger  { background: transparent; color: var(--accent); border-color: var(--accent); }
    .btn-danger:hover  { background: var(--accent); color: #fff; }
    .btn-ghost  { background: transparent; color: var(--muted); border-color: var(--border); }
    .btn-ghost:hover  { color: var(--ink); border-color: var(--ink); }
    .btn-sm { padding: 0.35rem 0.8rem; font-size: 0.7rem; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Spinner */
    .spinner {
      display: none; width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading .spinner { display: block; }
    .loading .btn-text { display: none; }

    /* ── Image Grid ── */
    .grid-controls {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.25rem; gap: 1rem; flex-wrap: wrap;
    }
    .search-box {
      display: flex; align-items: center; gap: 0; flex: 1; max-width: 300px;
    }
    .search-box input {
      border-right: none; border-radius: var(--radius) 0 0 var(--radius);
    }
    .search-box button {
      padding: 0.55rem 0.8rem; border: 1.5px solid var(--border);
      border-left: none; background: var(--cream); border-radius: 0 var(--radius) var(--radius) 0;
      cursor: pointer; font-size: 0.9rem; transition: background 0.15s;
    }
    .search-box button:hover { background: var(--border); }

    #imageGrid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
    }
    .img-card {
      border: 1.5px solid var(--border); border-radius: var(--radius);
      background: #fff; overflow: hidden;
      transition: transform 0.15s, box-shadow 0.15s;
      cursor: pointer;
    }
    .img-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.1); }
    .img-card .thumb {
      aspect-ratio: 4/3; background: var(--cream);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .img-card .thumb img { width: 100%; height: 100%; object-fit: cover; }
    .img-card .thumb .no-img { font-size: 2.5rem; }
    .img-card .card-body { padding: 0.75rem; }
    .img-card .card-name {
      font-family: 'DM Serif Display', serif; font-size: 0.95rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .img-card .card-type {
      font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--muted); margin: 0.2rem 0;
    }
    .badge {
      display: inline-block; padding: 0.15rem 0.55rem;
      border-radius: 999px; font-size: 0.65rem; letter-spacing: 0.1em;
      text-transform: uppercase; font-weight: 500;
    }
    .badge-doc  { background: #dbeafe; color: #1e40af; }
    .badge-foto { background: #dcfce7; color: #15803d; }
    .badge-fac  { background: #fef9c3; color: #854d0e; }
    .badge-otro { background: var(--cream); color: var(--muted); }
    .card-actions { display: flex; gap: 0.4rem; margin-top: 0.6rem; }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(15,14,12,0.7);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: #fff; border-radius: 4px; width: min(520px, 94vw);
      max-height: 90vh; overflow-y: auto;
      transform: translateY(12px); transition: transform 0.2s;
    }
    .modal-overlay.open .modal { transform: none; }
    .modal-head {
      padding: 1rem 1.25rem; border-bottom: 1.5px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      background: var(--cream);
    }
    .modal-head h3 { font-family: 'DM Serif Display', serif; font-size: 1.2rem; font-weight: 400; }
    .modal-close { background: none; border: none; font-size: 1.4rem; cursor: pointer; color: var(--muted); }
    .modal-close:hover { color: var(--ink); }
    .modal-body { padding: 1.5rem 1.25rem; }
    .modal-img { width: 100%; aspect-ratio: 16/9; object-fit: contain; background: var(--cream); border-radius: var(--radius); margin-bottom: 1rem; }
    .detail-row { display: flex; gap: 0.5rem; margin-bottom: 0.6rem; align-items: baseline; }
    .detail-key { font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); min-width: 100px; }
    .detail-val { flex: 1; }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 2rem; right: 2rem; z-index: 200;
      display: flex; flex-direction: column; gap: 0.6rem;
    }
    .toast-item {
      padding: 0.75rem 1.2rem; border-radius: var(--radius);
      font-size: 0.8rem; letter-spacing: 0.05em;
      animation: toastIn 0.25s ease forwards;
      max-width: 300px;
    }
    .toast-item.success { background: var(--success); color: #fff; }
    .toast-item.error   { background: var(--accent); color: #fff; }
    @keyframes toastIn { from { opacity:0; transform: translateX(20px); } to { opacity:1; transform: none; } }

    /* ── Empty state ── */
    .empty-state {
      grid-column: 1/-1; text-align: center; padding: 4rem 1rem; color: var(--muted);
    }
    .empty-state .big { font-size: 3.5rem; margin-bottom: 0.75rem; }
    .empty-state p { font-size: 0.85rem; }

    /* ── Divider ── */
    hr { border: none; border-top: 1px solid var(--border); margin: 1rem 0; }

    /* Classify status */
    #classifyStatus {
      margin-top: 0.75rem; font-size: 0.78rem; color: var(--muted);
      min-height: 1.2em;
    }
    #classifyStatus.ok { color: var(--success); }
    #classifyStatus.err { color: var(--accent); }

    .tag-tipo {
      display: inline-block; margin-top: 0.5rem;
      padding: 0.25rem 0.75rem; border: 1.5px solid var(--ink);
      border-radius: var(--radius); font-size: 0.75rem;
      letter-spacing: 0.1em; text-transform: uppercase;
    }
  </style>
</head>
<body>

<header>
  <h1>Catálogo de Imágenes</h1>
  <span>Sistema de Clasificación IA</span>
</header>

<main>
  <!-- ── Upload Panel ── -->
  <aside>
    <div class="panel">
      <div class="panel-header">
        <h2>Nueva Imagen</h2>
      </div>
      <div class="panel-body">
        <div class="field">
          <label>Nombre del archivo</label>
          <input type="text" id="inputNombre" placeholder="Mi documento…" />
        </div>

        <div class="field">
          <label>Archivo de imagen</label>
          <div class="drop-zone" id="dropZone">
            <input type="file" id="inputArchivo" accept="image/*" />
            <span class="dz-icon">🖼</span>
            <span class="dz-text">Arrastra o haz clic para seleccionar</span>
            <div class="dz-name" id="dzName"></div>
          </div>
        </div>

        <hr>

        <!-- Classify via Lambda -->
        <button class="btn btn-ghost" style="width:100%;justify-content:center;margin-bottom:.75rem" id="btnClasificar">
          <span class="btn-text">⚡ Clasificar con IA</span>
          <span class="spinner"></span>
        </button>
        <div id="classifyStatus"></div>

        <div class="field" style="margin-top:.75rem">
          <label>Tipo detectado</label>
          <input type="text" id="inputTipo" placeholder="Se llenará automáticamente…" />
        </div>
        <div class="field">
          <label>Descripción</label>
          <textarea id="inputDesc" placeholder="Descripción generada por IA…"></textarea>
        </div>

        <hr>
        <button class="btn btn-primary" id="btnGuardar">
          <span class="btn-text">Guardar en catálogo</span>
          <span class="spinner"></span>
        </button>
      </div>
    </div>
  </aside>

  <!-- ── Gallery Panel ── -->
  <section>
    <div class="grid-controls">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Buscar por nombre…" />
        <button onclick="filtrar()">🔍</button>
      </div>
      <span id="totalCount" style="color:var(--muted);font-size:.75rem"></span>
    </div>
    <div id="imageGrid"></div>
  </section>
</main>

<!-- ── Detail Modal ── -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-head">
      <h3 id="modalTitle">Detalle</h3>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body">
      <img id="modalImg" class="modal-img" src="" alt="" />
      <div class="detail-row"><span class="detail-key">Nombre</span><span class="detail-val" id="dNombre"></span></div>
      <div class="detail-row"><span class="detail-key">Tipo</span><span class="detail-val" id="dTipo"></span></div>
      <div class="detail-row"><span class="detail-key">Descripción</span><span class="detail-val" id="dDesc" style="white-space:pre-wrap"></span></div>
      <hr>
      <div style="display:flex;gap:.6rem;justify-content:flex-end">
        <button class="btn btn-ghost btn-sm" onclick="closeModalDirect()">Cerrar</button>
        <button class="btn btn-danger btn-sm" id="btnDelete">Eliminar</button>
      </div>
    </div>
  </div>
</div>

<!-- ── Toast container ── -->
<div id="toast"></div>

<script>
  const API = '/api/imagenes/';
  const LAMBDA_URL = '{{ lambda_url }}'; // set in Django view context

  let allImages = [];
  let currentId = null;

  // ── Helpers ──────────────────────────────────────────────
  function toast(msg, type = 'success') {
    const el = document.createElement('div');
    el.className = `toast-item ${type}`;
    el.textContent = msg;
    document.getElementById('toast').appendChild(el);
    setTimeout(() => el.remove(), 3500);
  }

  function badgeClass(tipo) {
    if (!tipo) return 'badge-otro';
    const t = tipo.toLowerCase();
    if (t.includes('documento')) return 'badge-doc';
    if (t.includes('foto')) return 'badge-foto';
    if (t.includes('factura')) return 'badge-fac';
    return 'badge-otro';
  }

  function setLoading(btn, state) {
    btn.classList.toggle('loading', state);
    btn.disabled = state;
  }

  // ── Drop zone ────────────────────────────────────────────
  const dropZone = document.getElementById('dropZone');
  const inputArchivo = document.getElementById('inputArchivo');

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault(); dropZone.classList.remove('over');
    if (e.dataTransfer.files[0]) { inputArchivo.files = e.dataTransfer.files; updateDZName(); }
  });
  inputArchivo.addEventListener('change', updateDZName);

  function updateDZName() {
    const f = inputArchivo.files[0];
    document.getElementById('dzName').textContent = f ? f.name : '';
    if (f && !document.getElementById('inputNombre').value)
      document.getElementById('inputNombre').value = f.name.replace(/\.[^.]+$/, '');
  }

  // ── Classify ─────────────────────────────────────────────
  document.getElementById('btnClasificar').addEventListener('click', async () => {
    const file = inputArchivo.files[0];
    if (!file) { toast('Selecciona una imagen primero', 'error'); return; }

    const btn = document.getElementById('btnClasificar');
    const status = document.getElementById('classifyStatus');
    setLoading(btn, true);
    status.className = '';
    status.textContent = 'Clasificando…';

    try {
      const b64 = await toBase64(file);
      const resp = await fetch(LAMBDA_URL || '/api/classify/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ image_b64: b64.split(',')[1], filename: file.name })
      });
      if (!resp.ok) throw new Error('Lambda error ' + resp.status);
      const data = await resp.json();
      document.getElementById('inputTipo').value = data.tipo_detectado || '';
      document.getElementById('inputDesc').value = data.descripcion || '';
      status.textContent = '✓ Clasificado: ' + (data.tipo_detectado || 'desconocido');
      status.className = 'ok';
    } catch (e) {
      status.textContent = '✗ No se pudo clasificar. Completa manualmente.';
      status.className = 'err';
    } finally {
      setLoading(btn, false);
    }
  });

  function toBase64(file) {
    return new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = () => res(r.result);
      r.onerror = rej;
      r.readAsDataURL(file);
    });
  }

  // ── Save ─────────────────────────────────────────────────
  document.getElementById('btnGuardar').addEventListener('click', async () => {
    const nombre = document.getElementById('inputNombre').value.trim();
    const file   = inputArchivo.files[0];
    if (!nombre || !file) { toast('Nombre y archivo son requeridos', 'error'); return; }

    const btn = document.getElementById('btnGuardar');
    setLoading(btn, true);

    const fd = new FormData();
    fd.append('nombre', nombre);
    fd.append('tipo_detectado', document.getElementById('inputTipo').value);
    fd.append('descripcion',    document.getElementById('inputDesc').value);
    fd.append('archivo', file);

    try {
      const resp = await fetch(API, { method: 'POST', body: fd });
      if (!resp.ok) throw new Error();
      toast('Imagen guardada ✓');
      document.getElementById('inputNombre').value = '';
      document.getElementById('inputTipo').value = '';
      document.getElementById('inputDesc').value = '';
      document.getElementById('dzName').textContent = '';
      inputArchivo.value = '';
      document.getElementById('classifyStatus').textContent = '';
      cargar();
    } catch {
      toast('Error al guardar', 'error');
    } finally {
      setLoading(btn, false);
    }
  });

  // ── Load & Filter ─────────────────────────────────────────
  async function cargar() {
    const resp = await fetch(API);
    allImages = await resp.json();
    renderGrid(allImages);
  }

  function filtrar() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    renderGrid(allImages.filter(i => i.nombre.toLowerCase().includes(q)));
  }

  document.getElementById('searchInput').addEventListener('keyup', e => { if (e.key === 'Enter') filtrar(); });

  function renderGrid(imgs) {
    const grid = document.getElementById('imageGrid');
    document.getElementById('totalCount').textContent = `${imgs.length} imagen${imgs.length !== 1 ? 'es' : ''}`;

    if (!imgs.length) {
      grid.innerHTML = `<div class="empty-state"><div class="big">📭</div><p>Sin imágenes. Sube una para comenzar.</p></div>`;
      return;
    }

    grid.innerHTML = imgs.map(img => `
      <div class="img-card" onclick="openModal(${img.id})">
        <div class="thumb">
          ${img.archivo ? `<img src="${img.archivo}" alt="${img.nombre}" loading="lazy"/>` : '<span class="no-img">🖼</span>'}
        </div>
        <div class="card-body">
          <div class="card-name">${img.nombre}</div>
          <div class="card-type">
            <span class="badge ${badgeClass(img.tipo_detectado)}">${img.tipo_detectado || 'sin tipo'}</span>
          </div>
          <div class="card-actions">
            <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();eliminar(${img.id})">✕ Borrar</button>
          </div>
        </div>
      </div>
    `).join('');
  }

  // ── Modal ─────────────────────────────────────────────────
  function openModal(id) {
    const img = allImages.find(i => i.id === id);
    if (!img) return;
    currentId = id;
    document.getElementById('modalTitle').textContent = img.nombre;
    document.getElementById('modalImg').src = img.archivo || '';
    document.getElementById('dNombre').textContent = img.nombre;
    document.getElementById('dTipo').innerHTML = `<span class="badge ${badgeClass(img.tipo_detectado)}">${img.tipo_detectado || '—'}</span>`;
    document.getElementById('dDesc').textContent = img.descripcion || '—';
    document.getElementById('btnDelete').onclick = () => eliminar(id);
    document.getElementById('modalOverlay').classList.add('open');
  }

  function closeModal(e) { if (e.target === document.getElementById('modalOverlay')) closeModalDirect(); }
  function closeModalDirect() { document.getElementById('modalOverlay').classList.remove('open'); }

  // ── Delete ────────────────────────────────────────────────
  async function eliminar(id) {
    if (!confirm('¿Eliminar esta imagen?')) return;
    try {
      await fetch(`${API}${id}/`, { method: 'DELETE' });
      toast('Imagen eliminada');
      closeModalDirect();
      cargar();
    } catch { toast('Error al eliminar', 'error'); }
  }

  cargar();
</script>
</body>
</html>
